repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv tool run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv tool run ruff format
        language: system
        types: [python]

      - id: ty-check
        name: ty check
        entry: uv tool run ty check
        language: system
        types: [python]
        pass_filenames: false
